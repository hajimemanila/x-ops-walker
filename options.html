<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X-Ops Walker Options</title>
    <style>
        :root {
            --bg-color: #000000;
            --sidebar-bg: #000000;
            --content-bg: #000000;
            --border-color: #2f3336;
            --text-main: #eff3f4;
            --text-dim: #71767b;
            --accent-blue: #1d9bf0;
            --accent-hover: rgba(29, 155, 240, 0.1);
            --danger: #f4212e;
            --success: #00ba7c;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* --- Sidebar Navigation --- */
        nav {
            width: 280px;
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            padding: 20px 10px;
        }

        .nav-header {
            padding: 0 15px 20px;
            font-size: 20px;
            font-weight: 800;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .nav-header img {
            width: 32px;
            height: 32px;
        }

        .nav-item {
            padding: 12px 16px;
            margin: 4px 0;
            border-radius: 9999px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 400;
            transition: background-color 0.2s;
            display: flex;
            align-items: center;
            gap: 15px;
            color: var(--text-main);
            text-decoration: none;
        }

        .nav-item:hover {
            background-color: rgba(255, 255, 255, 0.1);
        }

        .nav-item.active {
            font-weight: 700;
            background-color: rgba(255, 255, 255, 0.1);
        }

        /* --- Content Panels --- */
        main {
            flex: 1;
            overflow-y: auto;
            padding: 40px;
            max-width: 800px;
            margin: 0 auto;
        }

        .panel {
            display: none;
        }

        .panel.active {
            display: block;
        }

        h2 {
            font-size: 24px;
            font-weight: 800;
            margin-bottom: 24px;
        }

        .section {
            background-color: #16181c;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 24px;
        }

        .section-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* --- Forms & Inputs --- */
        .form-group {
            margin-bottom: 16px;
        }

        label {
            display: block;
            font-size: 14px;
            color: var(--text-dim);
            margin-bottom: 8px;
        }

        input[type="text"] {
            width: 100%;
            background: transparent;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            padding: 12px;
            color: var(--text-main);
            font-size: 16px;
            outline: none;
        }

        input[type="text"]:focus {
            border-color: var(--accent-blue);
        }

        .btn {
            background-color: var(--accent-blue);
            color: white;
            border: none;
            border-radius: 9999px;
            padding: 10px 20px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .btn:hover {
            opacity: 0.9;
        }

        .btn-outline {
            background-color: transparent;
            border: 1px solid var(--border-color);
            color: var(--accent-blue);
        }

        .btn-danger {
            background-color: transparent;
            color: var(--danger);
            border: 1px solid var(--border-color);
        }

        .btn-danger:hover {
            background-color: rgba(244, 33, 46, 0.1);
        }

        /* --- Bookmark List --- */
        .bookmark-list {
            list-style: none;
        }

        .bookmark-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid var(--border-color);
        }

        .bookmark-item:last-child {
            border-bottom: none;
        }

        .bookmark-info {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .bookmark-title {
            font-weight: 700;
            font-size: 16px;
        }

        .bookmark-url {
            color: var(--text-dim);
            font-size: 13px;
        }

        .bookmark-actions {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .btn-reorder {
            padding: 4px 8px;
            font-size: 12px;
            background-color: #333;
            color: var(--text-main);
            border-radius: 4px;
        }

        .btn-reorder:disabled {
            opacity: 0.2;
            cursor: not-allowed;
        }

        .edit-input {
            width: 100%;
            background: #202327;
            border: 1px solid var(--accent-blue);
            border-radius: 4px;
            padding: 4px 8px;
            color: var(--text-main);
            font-size: 14px;
            margin-bottom: 4px;
        }

        .btn-save {
            background-color: var(--success);
            padding: 4px 12px;
        }

        .btn-cancel {
            background-color: transparent;
            border: 1px solid var(--border-color);
            padding: 4px 12px;
        }

        /* ── Cascade Lock (UI Shadow) ── */
        .disabled-section {
            opacity: 0.4;
            pointer-events: none;
            transition: opacity 0.3s ease;
            filter: grayscale(50%);
        }

        /* --- General Settings --- */
        .setting-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
        }

        /* Custom Checkbox/Toggle */
        .switch {
            position: relative;
            display: inline-block;
            width: 44px;
            height: 24px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #3e4144;
            transition: .4s;
            border-radius: 24px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }

        input:checked+.slider {
            background-color: var(--accent-blue);
        }

        input:checked+.slider:before {
            transform: translateX(20px);
        }

        #quick-add-msg {
            margin-top: 10px;
            font-size: 13px;
            color: var(--success);
            display: none;
        }
    </style>
</head>

<body>
    <nav>
        <div class="nav-header">
            <img src="icons/icon48.png" alt="Logo">
            X-Ops
        </div>
        <div class="nav-item active" data-tab="bookmarks">
            <span>🔖</span> [X.com / Star]
        </div>
        <div class="nav-item" data-tab="general">
            <span>⚙️</span> [General]
        </div>
        <div class="nav-item" data-tab="system">
            <span>🖥️</span> [System Info]
        </div>
    </nav>

    <main>
        <!-- Bookmark Panel -->
        <div id="panel-bookmarks" class="panel active">
            <h2>ブックマーク管理</h2>

            <div class="section">
                <div class="section-title">
                    新規登録
                </div>
                <div class="form-group">
                    <label for="input-title">タイトル</label>
                    <input type="text" id="input-title" placeholder="X-Ops Dashboard">
                </div>
                <div class="form-group">
                    <label for="input-url">URL</label>
                    <input type="text" id="input-url" placeholder="x.com/home">
                </div>
                <button id="btn-save-bookmark" class="btn">保存する</button>
                <div id="quick-add-msg">登録しました！</div>
            </div>

            <div class="section">
                <div class="section-title">登録済み一覧</div>
                <ul id="bookmark-list" class="bookmark-list">
                    <!-- Dynamic Content -->
                </ul>
            </div>
        </div>

        <!-- General Settings Panel -->
        <div id="panel-general" class="panel">
            <h2>全般設定</h2>
            <div class="section">
                <div class="setting-row">
                    <span>Walker Mode (Master ON/OFF)</span>
                    <label class="switch">
                        <input type="checkbox" id="check-walker-mode">
                        <span class="slider"></span>
                    </label>
                </div>
                <div class="setting-row">
                    <span>Smart Tab Discard</span>
                    <label class="switch">
                        <input type="checkbox" id="check-alm-enabled">
                        <span class="slider"></span>
                    </label>
                </div>
            </div>
        </div>

        <!-- System info Panel -->
        <div id="panel-system" class="panel">
            <h2>システム情報</h2>
            <div class="section">
                <p style="color: var(--text-dim);">将来の拡張用（リソース監視等）</p>
                <div id="extension-version" style="margin-top: 20px; font-family: monospace;">Version: --</div>
            </div>
        </div>
    </main>

    <script src="options.js"></script>
</body>

</html>

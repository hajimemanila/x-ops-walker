<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>X-Ops Walker</title>
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            width: 260px;
            background: #0a0a16;
            color: #e0e0f0;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            font-size: 13px;
            user-select: none;
            overflow: hidden;
        }

        /* ── Header ── */
        #header {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 14px 16px 12px;
            background: linear-gradient(135deg, rgba(255, 140, 0, 0.10) 0%, rgba(255, 140, 0, 0.03) 100%);
            border-bottom: 1px solid rgba(255, 255, 255, 0.07);
        }

        #header .logo {
            width: 24px;
            height: 24px;
            object-fit: contain;
        }

        #header .title {
            font-size: 12px;
            font-weight: 800;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.90);
        }

        #header .version {
            margin-left: auto;
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 0.06em;
            color: rgba(255, 140, 0, 0.70);
            background: rgba(255, 140, 0, 0.10);
            border: 1px solid rgba(255, 140, 0, 0.20);
            border-radius: 999px;
            padding: 1px 7px;
        }

        /* ── Mode card ── */
        #mode-card {
            margin: 12px 12px 0;
            padding: 14px 16px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
        }

        #mode-card .row {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        #mode-card .label-group {
            display: flex;
            flex-direction: column;
            gap: 3px;
        }

        #mode-card .mode-label {
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.45);
        }

        #status-text {
            font-size: 16px;
            font-weight: 700;
            letter-spacing: 0.04em;
            transition: color 0.2s;
        }

        #status-text.on {
            color: #ffac30;
        }

        #status-text.off {
            color: rgba(255, 255, 255, 0.35);
        }

        /* Toggle switch */
        #toggle {
            position: relative;
            width: 52px;
            height: 28px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 999px;
            cursor: pointer;
            transition: background 0.25s, border-color 0.25s, box-shadow 0.25s;
            flex-shrink: 0;
        }

        #toggle::after {
            content: '';
            position: absolute;
            top: 3px;
            left: 3px;
            width: 20px;
            height: 20px;
            background: rgba(255, 255, 255, 0.50);
            border-radius: 50%;
            transition: transform 0.25s cubic-bezier(0.4, 0, 0.2, 1), background 0.25s;
        }

        #toggle.active {
            background: rgba(255, 140, 0, 0.25);
            border-color: rgba(255, 140, 0, 0.50);
            box-shadow: 0 0 12px rgba(255, 140, 0, 0.20);
        }

        #toggle.active::after {
            transform: translateX(24px);
            background: #ffac30;
        }

        /* Status dot */
        #status-row {
            display: flex;
            align-items: center;
            gap: 5px;
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid rgba(255, 255, 255, 0.06);
        }

        #status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            transition: background 0.25s, box-shadow 0.25s;
        }

        #status-dot.on {
            background: #4ade80;
            box-shadow: 0 0 6px rgba(74, 222, 128, 0.6);
        }

        #status-dot.off {
            background: rgba(255, 255, 255, 0.20);
        }

        #status-detail {
            font-size: 10px;
            letter-spacing: 0.05em;
            color: rgba(255, 255, 255, 0.30);
        }

        /* ── Shortcuts card ── */
        #shortcuts-card {
            margin: 8px 12px 0;
            padding: 12px 14px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 12px;
        }

        #shortcuts-card .sc-title {
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.10em;
            text-transform: uppercase;
            color: rgba(255, 140, 0, 0.55);
            margin-bottom: 6px;
        }

        #shortcuts-card .sc-hint {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.45);
            line-height: 1.5;
        }

        .key-badge {
            display: inline-block;
            font-family: 'Cascadia Code', 'Consolas', monospace;
            font-size: 10px;
            font-weight: 700;
            color: #ffac30;
            background: rgba(255, 140, 0, 0.12);
            border: 1px solid rgba(255, 140, 0, 0.25);
            border-radius: 4px;
            padding: 0 5px;
        }

        /* ── Settings card ── */
        #settings-card {
            margin: 8px 12px 0;
            padding: 10px 14px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 12px;
        }

        .setting-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .setting-label {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.50);
            letter-spacing: 0.04em;
        }

        /* Mini toggle — same design language as #toggle but smaller */
        .mini-toggle {
            position: relative;
            width: 36px;
            height: 20px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 999px;
            cursor: pointer;
            transition: background 0.25s, border-color 0.25s, box-shadow 0.25s;
            flex-shrink: 0;
        }

        .mini-toggle::after {
            content: '';
            position: absolute;
            top: 2px;
            left: 2px;
            width: 14px;
            height: 14px;
            background: rgba(255, 255, 255, 0.50);
            border-radius: 50%;
            transition: transform 0.25s cubic-bezier(0.4, 0, 0.2, 1), background 0.25s;
        }

        .mini-toggle.active {
            background: rgba(255, 140, 0, 0.25);
            border-color: rgba(255, 140, 0, 0.50);
            box-shadow: 0 0 8px rgba(255, 140, 0, 0.20);
        }

        .mini-toggle.active::after {
            transform: translateX(16px);
            background: #ffac30;
        }

        /* ── Advanced Settings Link ── */
        #advanced-settings {
            display: block;
            margin: 12px 16px 0;
            text-align: center;
            font-size: 11px;
            font-weight: 600;
            color: rgba(255, 140, 0, 0.6);
            text-decoration: none;
            letter-spacing: 0.05em;
            transition: color 0.2s;
            cursor: pointer;
        }

        #advanced-settings:hover {
            color: rgba(255, 140, 0, 0.9);
            text-decoration: underline;
        }

        /* ── Dynamic Domain Button ── */
        .domain-btn {
            margin-top: 10px;
            width: 100%;
            padding: 8px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px dashed rgba(255, 255, 255, 0.15);
            border-radius: 6px;
            color: rgba(255, 255, 255, 0.6);
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
        }

        .domain-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
        }

        .domain-btn.active {
            background: rgba(74, 222, 128, 0.1);
            border-color: rgba(74, 222, 128, 0.4);
            color: #4ade80;
            border-style: solid;
        }

        .domain-btn.active:hover {
            background: rgba(239, 68, 68, 0.1);
            border-color: rgba(239, 68, 68, 0.4);
            color: #ef4444;
        }

        /* ── Separator ── */
        .card-separator {
            height: 1px;
            background: rgba(255, 255, 255, 0.05);
            margin: 10px 0;
        }

        /* ── Sections (v2.1) ── */
        .section-title {
            font-size: 0.75rem;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        .section-container {
            margin-bottom: 16px;
        }

        .sub-settings {
            padding-left: 20px;
            margin-top: 8px;
            border-left: 2px solid rgba(255, 255, 255, 0.1);
        }

        /* ── Footer ── */
        #footer {
            padding: 10px 16px 12px;
            text-align: center;
            font-size: 10px;
            color: rgba(255, 255, 255, 0.18);
            letter-spacing: 0.05em;
        }

        /* ── Custom Scrollbar (v2.1.1) ── */
        /* Firefox */
        html,
        body {
            scrollbar-width: thin;
            scrollbar-color: rgba(255, 255, 255, 0.15) transparent;
        }

        /* WebKit (Chrome/Edge/Safari) */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.15);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.3);
        }
    </style>
</head>

<body>

    <!-- Header -->
    <div id="header">
        <img src="icons/icon48.png" class="logo" alt="X-Ops Walker" />
        <span class="title" id="title-text">X-Ops Walker</span>
        <span class="version" id="version-badge"></span>
    </div>

    <!-- Mode Card -->
    <div id="mode-card">
        <div class="row">
            <div class="label-group">
                <span class="mode-label" id="mode-label" data-i18n="popup_mode_label">Walker Mode</span>
                <span id="status-text" class="off">—</span>
            </div>
            <div id="toggle" role="switch" aria-checked="false"></div>
        </div>
        <div id="status-row">
            <div id="status-dot" class="off"></div>
            <span id="status-detail"></span>
        </div>
    </div>

    <!-- Shortcuts Card -->
    <div id="shortcuts-card">
        <div class="sc-title" id="sc-title" data-i18n="popup_sc_title"></div>
        <div class="sc-hint" id="sc-hint"></div>
    </div>

    <!-- Settings Card -->
    <div id="settings-card">

        <!-- Global Systems Section -->
        <div class="section-container">
            <div class="section-title" id="section-global-title" data-i18n="section_global">🌍 Global Systems</div>

            <!-- Google One Tap Blocker -->
            <div class="setting-row">
                <span class="setting-label" id="blocker-label" data-i18n="popup_blocker_label"></span>
                <div id="blocker-toggle" class="mini-toggle" role="switch" aria-checked="false"></div>
            </div>

            <div class="card-separator"></div>

            <!-- ALM: Strategic Hibernation -->
            <div class="setting-row">
                <span class="setting-label" id="alm-master-label" data-i18n="popup_smart_discard_label">Smart Tab
                    Discard</span>
                <div id="alm-master-toggle" class="mini-toggle active" role="switch" aria-checked="true"></div>
            </div>

            <!-- Dynamic Domain Button (Smart Tab Discard専用) -->
            <button id="dynamic-domain-btn" class="domain-btn">Loading domain...</button>

            <div class="card-separator"></div>

            <!-- ALM: AHK Physical Reclaim -->
            <div class="setting-row">
                <span class="setting-label" id="alm-ahk-label" data-i18n="popup_ahk_reclaim_label">AHK Physical Reclaim
                    ([WAKE])</span>
                <div id="alm-ahk-toggle" class="mini-toggle active" role="switch" aria-checked="true"></div>
            </div>

            <div class="card-separator"></div>

            <!-- ALM: Chat SafetyEnter -->
            <div class="setting-row" id="alm-safety-row">
                <span class="setting-label" id="alm-safety-label" data-i18n="popup_safety_enter_label">Chat
                    SafetyEnter</span>
                <div id="alm-safety-toggle" class="mini-toggle" role="switch" aria-checked="false"></div>
            </div>
        </div>

        <div class="card-separator"></div>

        <!-- Domain-Specific Protocols Section -->
        <div id="domain-protocol-container">
            <div class="section-title" id="section-domain-title" data-i18n="section_domain">📍 Domain Protocols</div>

            <div id="protocol-x" style="display: none;">
                <div class="setting-row">
                    <span class="setting-label" id="protocol-x-title" data-i18n="protocol_x_title">X Timeline
                        Walker</span>
                    <div id="toggle-protocol-x" class="mini-toggle" role="switch" aria-checked="false"></div>
                </div>
                <!-- Sub Settings for X -->
                <div id="protocol-x-sub" class="sub-settings">
                    <div class="setting-row">
                        <span class="setting-label" id="x-right-column-title" data-i18n="x_right_column_title">Right
                            Column Dashboard</span>
                        <div id="toggle-x-right-column" class="mini-toggle" role="switch" aria-checked="false"></div>
                    </div>
                </div>
            </div>
            <div id="protocol-gemini" style="display: none;">
                <div class="setting-row">
                    <span class="setting-label" id="protocol-gemini-title" data-i18n="protocol_gemini_title">Gemini
                        Walker</span>
                    <div id="toggle-protocol-gemini" class="mini-toggle" role="switch" aria-checked="false"></div>
                </div>
            </div>
            <div id="protocol-none" style="display: none;">
                <span class="setting-label" id="protocol-none-msg" data-i18n="protocol_none_msg"
                    style="display: block; text-align: center; color: rgba(255, 255, 255, 0.4); padding: 5px 0;"></span>
            </div>
        </div>

    </div>

    <!-- Advanced Settings Link -->
    <a id="advanced-settings" title="Open Extension Options" data-i18n="popup_advanced_settings">🛠 Advanced
        Settings</a>

    <!-- Footer -->
    <div id="footer" data-i18n="popup_footer_hint"></div>

    <script src="popup.js"></script>
</body>

</html>

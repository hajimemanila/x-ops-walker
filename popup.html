<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>X-Ops Walker</title>
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            width: 260px;
            background: #0a0a16;
            color: #e0e0f0;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            font-size: 13px;
            user-select: none;
            overflow: hidden;
        }

        /* ── Header ── */
        #header {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 14px 16px 12px;
            background: linear-gradient(135deg, rgba(255, 140, 0, 0.10) 0%, rgba(255, 140, 0, 0.03) 100%);
            border-bottom: 1px solid rgba(255, 255, 255, 0.07);
        }

        #header .logo {
            width: 24px;
            height: 24px;
            object-fit: contain;
        }

        #header .title {
            font-size: 12px;
            font-weight: 800;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.90);
        }

        #header .version {
            margin-left: auto;
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 0.06em;
            color: rgba(255, 140, 0, 0.70);
            background: rgba(255, 140, 0, 0.10);
            border: 1px solid rgba(255, 140, 0, 0.20);
            border-radius: 999px;
            padding: 1px 7px;
        }

        /* ── Base Card Style ── */
        .settings-card {
            margin: 12px 12px 0;
            padding: 14px 16px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
        }

        .card-title {
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.10em;
            text-transform: uppercase;
            color: rgba(255, 140, 0, 0.85);
            margin-bottom: 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            padding-bottom: 6px;
        }

        .setting-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 10px;
        }

        .setting-row:last-child {
            margin-bottom: 0;
        }

        .label-group {
            display: flex;
            flex-direction: column;
            gap: 3px;
        }

        .setting-label {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.65);
            letter-spacing: 0.04em;
        }

        .setting-label.bold {
            font-weight: 700;
            color: rgba(255, 255, 255, 0.85);
        }

        #status-text {
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.04em;
            transition: color 0.2s;
        }

        #status-text.on {
            color: #ffac30;
        }

        #status-text.off {
            color: rgba(255, 255, 255, 0.35);
        }

        /* Mini toggle */
        .mini-toggle {
            position: relative;
            width: 36px;
            height: 20px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 999px;
            cursor: pointer;
            transition: background 0.25s, border-color 0.25s, box-shadow 0.25s;
            flex-shrink: 0;
        }

        .mini-toggle::after {
            content: '';
            position: absolute;
            top: 2px;
            left: 2px;
            width: 14px;
            height: 14px;
            background: rgba(255, 255, 255, 0.50);
            border-radius: 50%;
            transition: transform 0.25s cubic-bezier(0.4, 0, 0.2, 1), background 0.25s;
        }

        .mini-toggle.active {
            background: rgba(255, 140, 0, 0.25);
            border-color: rgba(255, 140, 0, 0.50);
            box-shadow: 0 0 8px rgba(255, 140, 0, 0.20);
        }

        .mini-toggle.active::after {
            transform: translateX(16px);
            background: #ffac30;
        }

        /* Disabled states */
        .disabled-row {
            opacity: 0.4;
            pointer-events: none;
        }

        .disabled-section {
            opacity: 0.4;
            pointer-events: none;
            filter: grayscale(1);
        }

        /* ── Sub-section (Domain Protocols) ── */
        .sub-section {
            margin-top: 12px;
            padding-top: 10px;
            padding-left: 12px;
            border-top: 1px dashed rgba(255, 255, 255, 0.1);
            border-left: 2px solid rgba(255, 140, 0, 0.3);
            transition: opacity 0.3s ease, filter 0.3s ease;
        }

        .sub-title {
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.45);
            margin-bottom: 8px;
        }

        /* ── Footer ── */
        #footer {
            padding: 10px 16px 12px;
            text-align: center;
            font-size: 10px;
            color: rgba(255, 255, 255, 0.18);
            letter-spacing: 0.05em;
        }
    </style>
</head>

<body>

    <!-- Header -->
    <div id="header">
        <img src="icons/icon48.png" class="logo" alt="X-Ops Walker" />
        <span class="title" id="title-text">X-Ops Walker</span>
        <span class="version" id="version-badge"></span>
    </div>

    <!-- Global Operations Card -->
    <div id="global-ops-card" class="settings-card">
        <div class="card-title" id="global-ops-title"></div>

        <div class="setting-row">
            <div class="label-group">
                <span class="setting-label bold" id="walker-master-label"></span>
                <span id="status-text" class="off">—</span>
            </div>
            <div id="toggle" class="mini-toggle" role="switch" aria-checked="false"></div>
        </div>

        <div class="setting-row">
            <span class="setting-label" id="blocker-label"></span>
            <div id="blocker-toggle" class="mini-toggle" role="switch" aria-checked="false"></div>
        </div>

        <div class="setting-row disabled-row">
            <span class="setting-label" id="safety-label"></span>
            <div id="safety-toggle" class="mini-toggle" role="switch" aria-checked="false"></div>
        </div>
    </div>

    <!-- Phantom Mode Card -->
    <div id="phantom-mode-card" class="settings-card">
        <div class="card-title" id="phantom-mode-title"></div>

        <div class="setting-row">
            <span class="setting-label bold" id="phantom-master-label"></span>
            <div id="phantom-master-toggle" class="mini-toggle" role="switch" aria-checked="false"></div>
        </div>

        <div id="domain-protocols" class="sub-section disabled-section">
            <div class="sub-title" id="domain-protocols-title"></div>
            <div class="setting-row">
                <span class="setting-label" id="x-timeline-label"></span>
                <div id="phantom-x-toggle" class="mini-toggle" role="switch" aria-checked="false"></div>
            </div>

            <!-- Nested X Dashboard Toggle -->
            <div class="setting-row" style="padding-left: 12px; margin-top: -4px;">
                <span class="setting-label" id="x-dashboard-label"></span>
                <div id="phantom-dashboard-toggle" class="mini-toggle" role="switch" aria-checked="false"></div>
            </div>

            <div class="setting-row disabled-row">
                <span class="setting-label" id="gemini-label"></span>
                <div id="phantom-gemini-toggle" class="mini-toggle" role="switch" aria-checked="false"></div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <div id="footer" id="footer-hint"></div>

    <script src="popup.js"></script>
</body>

</html>
